name: Release

on:
  push:
    # run only against tags
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          # 'latest', 'nightly', or a semver
          version: "latest"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # After GoReleaser runs, attest all the files in ./dist/checksums.txt:
      - uses: actions/attest-build-provenance@v3
        with:
          subject-checksums: ./dist/checksums.txt

      # Publish NPM packages via Trusted Publishing (OIDC)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Build NPM packages
        run: |
          npx -y goreleaser-npm-publisher build \
            --prefix "@thekarel" \
            --description "TUI to list, filter and run package.json scripts." \
            --files LICENSE --files README.md \
            --keywords cli --keywords tui --keywords "package.json"
      - name: Publish NPM packages
        run: |
          npm --version
          for pkg in dist/npm/*/; do
            echo "Publishing $pkg..."
            npm publish "$pkg" --access public --provenance
          done
